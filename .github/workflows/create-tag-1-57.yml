name: Create tag 1.57

on:
  push:
    branches:
      - copilot/create-tag-1-57

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create annotated tag 1.57
        uses: actions/github-script@v7
        with:
          script: |
            const sha = '3efb5bdc044826e2dc19083687f75fd204855174';
            const tagName = '1.57';
            const message = 'the last commit for zig version 1.51';

            // Check if tag already exists
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });
              console.log(`Tag ${tagName} already exists, skipping.`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // Create the annotated tag object
            const tagObject = await github.rest.git.createTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName,
              message: message,
              object: sha,
              type: 'commit',
              tagger: {
                name: 'github-actions[bot]',
                email: 'github-actions[bot]@users.noreply.github.com',
              },
            });

            // Create the ref pointing to the tag object
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: tagObject.data.sha,
            });

            console.log(`Tag ${tagName} created successfully at ${sha}`);
