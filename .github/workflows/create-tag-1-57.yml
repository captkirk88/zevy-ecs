name: Create tag 1.57

on:
  push:
    branches:
      - copilot/create-tag-1-57

jobs:
  create-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create annotated tag 1.57 via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA="3efb5bdc044826e2dc19083687f75fd204855174"
          TAG="1.57"
          MESSAGE="the last commit for zig version 1.51"

          # Check if tag already exists
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/git/ref/tags/$TAG")

          if [ "$STATUS" = "200" ]; then
            echo "Tag $TAG already exists, skipping."
            exit 0
          fi

          # Create the annotated tag object
          TAG_SHA=$(curl -s \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/git/tags" \
            -d "{
              \"tag\": \"$TAG\",
              \"message\": \"$MESSAGE\",
              \"object\": \"$SHA\",
              \"type\": \"commit\",
              \"tagger\": {
                \"name\": \"github-actions[bot]\",
                \"email\": \"github-actions[bot]@users.noreply.github.com\"
              }
            }" | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          echo "Created tag object: $TAG_SHA"

          # Create the ref pointing to the tag object
          curl -s \
            -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/git/refs" \
            -d "{\"ref\": \"refs/tags/$TAG\", \"sha\": \"$TAG_SHA\"}"

          echo "Tag $TAG created successfully at $SHA"
