name: Create branch zig-1.51

on:
  push:
    branches:
      - copilot/create-tag-1-57

jobs:
  create-branch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create branch zig-1.51 from commit 3efb5bd
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="3efb5bdc044826e2dc19083687f75fd204855174"
          BRANCH="zig-1.51"
          REPO="${{ github.repository }}"

          # Check if branch already exists
          if gh api "repos/$REPO/git/ref/heads/$BRANCH" --silent 2>/dev/null; then
            echo "Branch $BRANCH already exists, skipping."
            exit 0
          fi

          # Create the branch
          gh api repos/$REPO/git/refs \
            --method POST \
            --field ref="refs/heads/$BRANCH" \
            --field sha="$SHA"

          echo "Branch $BRANCH created successfully at $SHA"
